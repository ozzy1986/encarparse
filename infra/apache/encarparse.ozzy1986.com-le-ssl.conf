<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName encarparse.ozzy1986.com
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/encarparse.ozzy1986.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/encarparse.ozzy1986.com/privkey.pem
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/
    RequestHeader set X-Forwarded-Proto https
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s
</VirtualHost>
</IfModule>
